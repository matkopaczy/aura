# Lokalna baza deweloperska. Produkcja: managed PostgreSQL w regionie UE (§6.1, §9).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura
      POSTGRES_DB: aura
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
